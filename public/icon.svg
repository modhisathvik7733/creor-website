    <!-- Top-left upper -->
    <line x1="-15" y1="-15" x2="-60" y2="-75" stroke-width="10" />
    <circle cx="-72" cy="-92" r="16" />
    <!-- Top-left lower branch -->
    <line x1="-22" y1="0" x2="-85" y2="15" stroke-width="8" />
