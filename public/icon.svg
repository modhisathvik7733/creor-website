    <line x1="0" y1="-22" x2="0" y2="-90" stroke-width="10" />
    <circle cx="0" cy="-110" r="20" />
    <!-- Top-right -->
    <line x1="15" y1="-15" x2="70" y2="-70" stroke-width="10" />
    <circle cx="85" cy="-85" r="20" />
    <!-- Right -->
    <line x1="22" y1="0" x2="100" y2="0" stroke-width="10" />
    <circle cx="120" cy="0" r="20" />
    <!-- Bottom-right -->
    <line x1="15" y1="15" x2="80" y2="80" stroke-width="10" />
    <circle cx="100" cy="100" r="24" />
    <!-- Bottom -->
    <line x1="0" y1="22" x2="-20" y2="110" stroke-width="10" />
