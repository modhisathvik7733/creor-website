    <!-- Bottom-left -->
    <line x1="-15" y1="15" x2="-90" y2="60" stroke-width="10" />
    <circle cx="-110" cy="72" r="18" />
    <!-- Left -->
    <line x1="-22" y1="-5" x2="-100" y2="-30" stroke-width="10" />
